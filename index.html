<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zersap - media diary</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Rubik+Mono+One&family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f1eb; /* Off-white / cream paper */
    --bg2: #ffffff; 
    --bg3: #e0ddd5;
    --border: #000000;
    --border-hover: #000000;
    --amber: #ff6b35; /* Vibrant retro orange */
    --amber-dim: rgba(255,107,53,0.15);
    --amber-glow: rgba(255,107,53,0.1);
    --text-primary: #0a0a0a;
    --text-secondary: #4a4a4a;
    --text-muted: #666666;
    --red: #e63946;
  }
  html.dark {
    --bg: #111111;
    --bg2: #111111;
    --bg3: #1e1e1e;
    --border: #ffffff;
    --border-hover: #ffffff;
    --text-primary: #f0ece3;
    --text-secondary: #888;
    --text-muted: #555;
  }
  html.dark body {
    background-color: #111111;
    background-image: radial-gradient(#2a2a2a 1.5px, transparent 1.5px);
  }


  html { background: var(--bg); color: var(--text-primary); font-family: 'DM Sans', sans-serif; }

  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background-color: var(--bg);
    background-image: radial-gradient(#c8c4b8 1.5px, transparent 1.5px);
    background-size: 16px 16px;
  }

  .noise {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.05;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    mix-blend-mode: multiply;
  }



  .wrap { 
    width: 100%;
    padding: 0 40px; 
    position: relative; 
    z-index: 1;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 40px 0 0;
    flex-shrink: 0;
    margin-bottom: 20px;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .category-tabs {
    display: flex;
    gap: 12px;
  }
  
  .tab-btn {
    background: var(--bg2);
    border: 3px solid var(--border);
    color: var(--border);
    font-family: 'Dela Gothic One', cursive;
    font-size: 13px;
    padding: 6px 0;
    width: 110px;
    text-align: center;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--border);
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    overflow: visible;
  }
  .tab-btn[data-category="movies"],
  .tab-btn[data-category="anime"] {
    border-style: dashed;
    opacity: 0.65;
    cursor: not-allowed;
    box-shadow: none;
    pointer-events: none;
  }
  .tab-btn[data-category="movies"]::after,
  .tab-btn[data-category="anime"]::after {
    content: 'SOON';
    position: absolute;
    top: -10px;
    right: -10px;
    background: var(--amber);
    color: var(--border);
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    font-weight: bold;
    padding: 2px 6px;
  }
  .tab-btn.active {
    background: var(--amber);
    color: var(--border);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--border);
  }

  h1.anime-title {
    font-family: 'Dela Gothic One', cursive;
    font-size: clamp(32px, 6vw, 56px);
    color: var(--bg2);
    -webkit-text-stroke: 2px var(--border);
    text-shadow: 
      3px 3px 0 var(--border),
      7px 7px 0 var(--amber);
    line-height: 1;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin: 0;
  }

  .count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: bold;
    color: var(--bg2);
    background: var(--border);
    border: 2px solid var(--border);
    border-radius: 0;
    padding: 6px 14px;
    white-space: nowrap;
    box-shadow: 3px 3px 0 var(--amber);
    text-transform: uppercase;
  }

  /* Compact Input Row */
  .compact-input {
    background: var(--bg2);
    border: 3px solid var(--border);
    padding: 4px 4px 4px 16px;
    display: flex;
    gap: 8px;
    width: 260px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 4px 4px 0 var(--border);
  }

  .compact-input:focus-within {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--amber);
  }

  .compact-input .url-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: bold;
    color: var(--text-primary);
    min-width: 0;
  }
  .compact-input .url-input::placeholder { color: var(--text-muted); font-weight: normal; }

  .icon-btn {
    background: var(--red);
    color: var(--bg2);
    border: 2px solid var(--border);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 2px 2px 0 var(--border);
  }

  .icon-btn:hover { 
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--border);
  }
  .icon-btn:active {
    transform: translate(0, 0);
    box-shadow: 0 0 0 var(--border);
  }
  .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--red);
    display: none;
  }
  .error-msg.show { display: block; }

  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    border-radius: 2px;
    margin-top: 10px;
    animation: shimmer 1.2s infinite;
    display: none;
  }
  .loading-bar.show { display: block; }
  @keyframes shimmer { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

  /* Compact Search */
  .compact-search {
    background: var(--bg2);
    border: 3px solid var(--border);
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: bold;
    color: var(--text-primary);
    width: 200px;
    outline: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 4px 4px 0 var(--border);
  }

  .compact-search:focus {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--red);
  }

  .compact-search::placeholder { color: var(--text-muted); font-weight: normal; }

  .shelf-wrapper {
    position: relative;
    padding-bottom: 0px;
    margin: 0 -24px;
    padding: 0 24px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow-x: auto;
    overflow-y: hidden;
  }

  .shelf-wrapper::-webkit-scrollbar { height: 12px; }
  .shelf-wrapper::-webkit-scrollbar-track { background: var(--bg3); border: 2px solid var(--border); border-left: none; border-right: none; }
  .shelf-wrapper::-webkit-scrollbar-thumb { background: var(--amber); border: 2px solid var(--border); }

  .gallery {
    display: flex;
    gap: 12px;
    padding: 10px 24px 20px;
    flex: 1;
    height: auto;
    overflow: visible;
    min-width: max-content;
    align-items: stretch;
  }

  .poster-slice {
    position: relative;
    width: 60px; /* Reduced from 80px */
    background: var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s, transform 0.3s;
    flex-shrink: 0;
    border: 3px solid var(--border);
    border-bottom: 4px solid var(--amber);
    box-shadow: 4px 4px 0 var(--border);
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Expand to full 16:9 poster on hover */
  .poster-slice:hover {
    width: 540px; 
    box-shadow: 8px 8px 0 var(--border);
    transform: translate(-4px, -4px);
    z-index: 10;
  }

  .poster-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.8;
    transition: opacity 0.6s, transform 0.6s, filter 0.6s;
    pointer-events: none;
    filter: contrast(110%) saturate(120%);
  }

  .poster-slice:hover .poster-img {
    opacity: 1;
    transform: scale(1.02);
    filter: contrast(120%) saturate(140%);
  }

  /* Vertical title shown when collapsed */
  .vertical-title {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) rotate(-180deg);
    writing-mode: vertical-rl;
    font-family: 'Dela Gothic One', cursive;
    font-size: 16px;
    color: var(--bg2);
    text-shadow: 2px 2px 0 var(--border), -1px -1px 0 var(--border), 1px -1px 0 var(--border), -1px 1px 0 var(--border), 1px 1px 0 var(--border);
    transition: opacity 0.3s;
    pointer-events: none;
    max-height: 80%;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .poster-slice:hover .vertical-title {
    opacity: 0;
  }

  /* Info overlay shown when expanded */
  .poster-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    pointer-events: none;
    display: flex;
    justify-content: flex-start;
    align-items: flex-end;
  }

  .info-left {
    background: var(--bg2);
    border-top: 4px solid var(--border);
    border-right: 4px solid var(--border);
    padding: 16px 24px;
    box-shadow: 8px -8px 0 var(--amber);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    max-width: 80%;
  }

  .poster-slice:hover .info-left {
    transform: translateY(0);
    pointer-events: auto;
  }

  .poster-title {
    font-family: 'Dela Gothic One', cursive;
    font-size: 24px;
    color: var(--border);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .poster-meta {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: bold;
    color: var(--red);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .poster-meta span.date {
    color: var(--text-secondary);
  }

  .play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    width: 80px;
    height: 80px;
    background: var(--amber);
    border: 4px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    z-index: 10;
    box-shadow: 6px 6px 0 var(--border);
  }

  .poster-slice:hover .play-button {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1) rotate(-5deg);
  }

  .play-button:hover {
    background: var(--red);
  }

  .play-button svg { width: 36px; height: 36px; fill: var(--border); margin-left: 6px; }
  
  .poster-link {
    position: absolute;
    inset: 0;
    z-index: 5;
  }

  .delete-btn {
    position: absolute;
    top: -4px; right: -4px;
    width: 40px; height: 40px;
    background: var(--bg2);
    border: 3px solid var(--border);
    color: var(--border);
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    line-height: 1;
    z-index: 20;
    box-shadow: 4px 4px 0 var(--border);
  }

  .poster-slice:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { 
    background: var(--red); 
    color: var(--bg2); 
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--border);
  }

  .pin-btn {
    position: absolute;
    top: -4px; right: 33px;
    width: 40px; height: 40px;
    background: var(--bg2);
    border: 3px solid var(--border);
    border-right: none;
    color: var(--border);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    line-height: 1;
    z-index: 20;
    box-shadow: 4px 4px 0 var(--border);
  }

  .poster-slice:hover .pin-btn { opacity: 1; }
  .pin-btn:hover { 
    background: var(--amber); 
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--border);
  }
  .pin-btn.pinned { color: var(--amber); }
  .pin-btn.pinned:hover { color: var(--bg2); }

  .spine-pin {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--amber);
    pointer-events: none;
    transition: opacity 0.3s;
    filter: drop-shadow(2px 2px 0px var(--border));
  }
  .poster-slice:hover .spine-pin { opacity: 0; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 40px;
    background: var(--border);
    border: 4px solid var(--border);
    box-shadow: 8px 8px 0 var(--amber);
    margin: 20px auto;
    max-width: 400px;
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 20px;
    color: var(--bg2);
  }

  .empty-state p {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: bold;
    color: var(--bg2);
    line-height: 1.7;
  }

  @keyframes amberFlash {
    0% { background: var(--border); border-color: var(--border); }
    50% { background: var(--amber); border-color: var(--border); }
    100% { background: var(--border); border-color: var(--border); }
  }
  .flash {
    animation: amberFlash 0.8s ease;
  }

  .app-footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 0 40px;
    flex-shrink: 0;
  }
  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: bold;
    color: var(--border);
    letter-spacing: 0.1em;
    background: var(--amber);
    border: 2px solid var(--border);
    padding: 6px 12px;
    box-shadow: 3px 3px 0 var(--border);
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    .app-header, .app-footer { flex-direction: column; gap: 16px; padding: 16px 0; align-items: stretch; }
    .header-left, .header-right { width: 100%; justify-content: space-between; }
    .compact-input, .compact-search { flex: 1; width: auto; }
    .footer-text { text-align: center; order: 2; margin-top: 8px; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<div class="wrap">
  <header class="app-header">
    <div class="header-left">
      <h1 class="anime-title">Zersap</h1>
      <div style="
        font-family: 'DM Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-top: 4px;
      ">メディア日記 · media diary</div>
    </div>
    
    <div class="header-center">
      <div class="category-tabs">
        <button class="tab-btn active" data-category="music">MUSIC</button>
        <button class="tab-btn" data-category="movies">MOVIES</button>
        <button class="tab-btn" data-category="anime">ANIME</button>
      </div>
    </div>
    
    <div class="header-right">
      <div style="position: relative; display: flex; align-items: center;">
        <input type="text" id="searchInput" class="compact-search" placeholder="search collection..." autocomplete="off">
        <button id="clearSearchBtn" style="position: absolute; right: 8px; background: none; border: none; font-size: 16px; cursor: pointer; display: none; font-weight: bold; color: var(--border);">✕</button>
      </div>
      <button id="themeToggle" title="Toggle Theme" style="background: var(--border); border: 2px solid var(--border); color: var(--bg2); cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; box-shadow: 3px 3px 0 var(--amber); font-size: 16px; font-weight: bold;">◑</button>
      <div class="count-badge" id="countBadge">0 tracks</div>
    </div>
  </header>

  <div class="loading-bar" id="loadingBar"></div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="shelf-wrapper">
    <div class="gallery" id="gallery"></div>
  </div>

  <footer class="app-footer">
    <div style="display: flex; gap: 12px; align-items: stretch;">
      <button id="authBtn" class="icon-btn" style="width: auto; padding: 0 16px; font-weight: bold; text-transform: uppercase;">Login</button>
      <div class="footer-text" id="userInfo">sign in to create your diary</div>
    </div>
    <div class="footer-action">
      <div class="compact-input">
        <input
          class="url-input"
          id="urlInput"
          type="url"
          placeholder="youtube link..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="icon-btn" id="addBtn" title="Add Track">+</button>
      </div>
    </div>
  </footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDkGtTtnjs3K2ma3BJkjb4W6IEZzCyyUUA",
    authDomain: "zersap.firebaseapp.com",
    projectId: "zersap",
    storageBucket: "zersap.firebasestorage.app",
    messagingSenderId: "602431770708",
    appId: "1:602431770708:web:ba0e91aa677722bb7b9dc1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let appData = { music: [], movies: [], anime: [] };


function thumb(id) {
  return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
}

function cleanTitle(title) {
  let cleaned = title;
  // Remove text in parentheses or brackets (e.g. (Official Video), [4K])
  cleaned = cleaned.replace(/[\(\[].*?[\)\]]/g, '');
  
  return cleaned.trim() || title;
}

function thumbFallback(img, id) {
  img.onerror = null;
  img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
}


function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
}

  const STORAGE_KEYS = {
    music: 'music_diary_v1',
    movies: 'movies_diary_v1',
    anime: 'anime_diary_v1'
  };

  const themeToggle = document.getElementById('themeToggle');
  const currentTheme = localStorage.getItem('theme') || 'light';
  if (currentTheme === 'dark') document.documentElement.classList.add('dark');

  themeToggle.addEventListener('click', () => {
    document.documentElement.classList.toggle('dark');
    const isDark = document.documentElement.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  let activeCategory = 'music';


  document.getElementById('authBtn').addEventListener('click', async () => {
    if (currentUser) {
      if (confirm('Logout?')) {
        await signOut(auth);
      }
    } else {
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
      } catch (e) {
        showError('Login failed: ' + e.message);
      }
    }
  });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    const authBtn = document.getElementById('authBtn');
    const userInfo = document.getElementById('userInfo');
    
    if (user) {
      authBtn.textContent = 'Logout';
      userInfo.textContent = `logged in as ${user.email}`;
      await fetchCloudData();
    } else {
      authBtn.textContent = 'Login';
      userInfo.textContent = 'sign in to create your diary';
      appData = { music: [], movies: [], anime: [] };
      renderAll();
    }
  });

  async function fetchCloudData() {
    if (!currentUser) return;
    try {
      document.getElementById('loadingBar').style.display = 'block';
      const docRef = doc(db, 'users', currentUser.uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        appData = docSnap.data();
        if (!appData.music) appData.music = [];
        if (!appData.movies) appData.movies = [];
        if (!appData.anime) appData.anime = [];
      } else {
        appData = { music: [], movies: [], anime: [] };
      }
    } catch(e) {
      console.error(e);
      showError('Failed to fetch data');
    } finally {
      document.getElementById('loadingBar').style.display = 'none';
      renderAll();
    }
  }

  async function saveCloudData() {
    if (!currentUser) return false;
    try {
      document.getElementById('loadingBar').style.display = 'block';
      const docRef = doc(db, 'users', currentUser.uid);
      await setDoc(docRef, appData);
      return true;
    } catch(e) {
      console.error(e);
      showError('Failed to save: ' + e.message);
      return false;
    } finally {
      document.getElementById('loadingBar').style.display = 'none';
    }
  }

  function load() {
    return appData[activeCategory] || [];
  }

  async function save(items) {
    appData[activeCategory] = items;
    await saveCloudData();
  }

  function applyAdminRules() {
    const isAdmin = !!currentUser;
    const input = document.getElementById('urlInput');
    const addBtn = document.getElementById('addBtn');
    
    if (activeCategory === 'music') {
      input.disabled = !isAdmin;
      addBtn.disabled = !isAdmin;
      input.placeholder = isAdmin ? 'youtube link...' : 'sign in to edit';
    }
    
    const authBtn = document.getElementById('authBtn');
    if (authBtn) {
      authBtn.style.background = isAdmin ? 'var(--amber)' : '';
      authBtn.style.color = isAdmin ? 'var(--bg2)' : '';
    }
    
    if (!isAdmin) {
      document.querySelectorAll('.pin-btn, .delete-btn').forEach(b => b.style.display = 'none');
      document.querySelectorAll('.poster-slice').forEach(c => c.draggable = false);
    } else {
      document.querySelectorAll('.pin-btn, .delete-btn').forEach(b => b.style.display = '');
    }
  }

  function renderAll(searchQuery = '') {
    const items = load();
    const gallery = document.getElementById('gallery');
    const badge = document.getElementById('countBadge');
    
    const actionText = activeCategory === 'music' ? 'listened' : 'watched';
    const typeLabel = activeCategory === 'anime' ? 'anime' : (activeCategory === 'movies' ? 'movies' : 'tracks');
    badge.textContent = `${items.length} ${typeLabel} ${actionText}`;
    gallery.innerHTML = '';

    const q = searchQuery.toLowerCase().trim();
    
    if (activeCategory === 'movies' || activeCategory === 'anime') {
      gallery.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🚧</div>
          <p>under construction.<br>this section is coming soon.</p>
        </div>`;
      applyAdminRules();
      return;
    }

    const filteredItems = items.filter(t => 
      !q || t.title.toLowerCase().includes(q) || t.channel.toLowerCase().includes(q)
    );

    if (filteredItems.length === 0) {
      gallery.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">♫</div>
          <p>${items.length === 0 ? `no ${typeLabel} yet.<br>add below to start your diary.` : 'no match found.'}</p>
        </div>`;
      applyAdminRules();
      return;
    }

    const unpinned = filteredItems.filter(t => !t.isPinned);
    const pinned = filteredItems.filter(t => t.isPinned);
    const sortedItems = [...unpinned, ...pinned];

    sortedItems.slice().reverse().forEach((t, i) => {
      const card = document.createElement('div');
      card.className = 'poster-slice';
      card.style.animationDelay = `${i * 0.04}s`;
      card.draggable = true;
      card.dataset.id = t.id;

      const thumbUrl = t.thumbnail || (t.videoId ? thumb(t.videoId) : '');
      const fallbackUrl = t.videoId ? `https://img.youtube.com/vi/${t.videoId}/hqdefault.jpg` : 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMwMDAiLz48L3N2Zz4=';

      const pinSvg = `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16,12V4H17V2H7V4H8V12L6,14V16H11.2V22H12.8V16H18V14L16,12Z" /></svg>`;

      card.innerHTML = `
        <img class="poster-img" id="img-${t.id}-${t.addedAt}" src="${thumbUrl}" alt="${t.title}" onerror="this.onerror=null; this.src='${fallbackUrl}'"/>
        ${t.isPinned ? `<div class="spine-pin">${pinSvg}</div>` : ''}
        
        <div class="vertical-title">${escHtml(cleanTitle(t.title))}</div>
      
      <div class="poster-info">
        <div class="info-left">
          <div class="poster-title">${escHtml(t.title)}</div>
          <div class="poster-meta">
            <span>${escHtml(t.channel)}</span>
            <span class="date">• ${fmtDate(t.addedAt)}</span>
          </div>
        </div>
      </div>

        <a class="poster-link" href="${t.url || '#'}" target="_blank" rel="noopener" title="Open Link">
        <div class="play-button">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </a>
      
      <button class="pin-btn ${t.isPinned ? 'pinned' : ''}" data-id="${t.id}" title="${t.isPinned ? 'Unpin' : 'Pin'}">${pinSvg}</button>
      <button class="delete-btn" data-id="${t.id}" title="Remove">✕</button>
    `;

    const img = card.querySelector('img');
    if(img.complete) img.classList.add('loaded');
    else img.onload = () => img.classList.add('loaded');

      card.querySelector('.pin-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        const allItems = load();
        const item = allItems.find(x => x.id === t.id);
        if (item) {
          item.isPinned = !item.isPinned;
          await save(allItems);
          renderAll(document.getElementById('searchInput').value);
        }
      });

      card.querySelector('.delete-btn').addEventListener('click', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        const items2 = load().filter(x => x.id !== t.id);
        await save(items2);
        renderAll(document.getElementById('searchInput').value);
      });

    gallery.appendChild(card);
  });
  applyAdminRules();
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

async function fetchMeta(url) {
  const endpoints = [
    `https://noembed.com/embed?url=${encodeURIComponent(url)}`,
    `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`
  ];
  for (const ep of endpoints) {
    try {
      const res = await fetch(ep);
      if (res.ok) {
        const data = await res.json();
        if (data.title) return data;
      }
    } catch(e) {}
  }
  throw new Error('Could not fetch video info');
}

  let isAdding = false;

  async function addTrack() {
    if (isAdding) return;
    
    const input = document.getElementById('urlInput');
    const query = input.value.trim();
    if (!query) return;

    const btn = document.getElementById('addBtn');
    const bar = document.getElementById('loadingBar');
    
    isAdding = true;
    btn.disabled = true;
    bar.style.display = 'block';
    showError('');

    try {
      let newItem;

      if (activeCategory === 'music') {
        let videoId = '';
        try {
          const urlObj = new URL(query);
          if (urlObj.hostname.includes('youtube.com')) {
            videoId = urlObj.searchParams.get('v');
          } else if (urlObj.hostname.includes('youtu.be')) {
            videoId = urlObj.pathname.slice(1);
          }
        } catch(e) {}
        if (!videoId) throw new Error('Invalid YouTube URL');

        const data = await fetchMeta(query);
        newItem = {
          id: videoId,
          videoId: videoId,
          title: data.title,
          channel: data.author_name,
          url: query,
          thumbnail: data.thumbnail_url,
          addedAt: Date.now()
        };
      } else {
        throw new Error('This section is under construction.');
      }

      const items = load();
      const existingItem = items.find(x => x.id === newItem.id);
      if (existingItem) {
        const el = document.getElementById('gallery').querySelector(`[data-id="${existingItem.id}"]`);
        if (el) {
          el.classList.add('flash');
          setTimeout(() => el.classList.remove('flash'), 800);
        }
        input.value = '';
        throw new Error('you already listened to this');
      }

      items.push(newItem);
      await save(items);
      
      input.value = '';
      renderAll(document.getElementById('searchInput').value);
    } catch (e) {
      showError(e.message);
    } finally {
      isAdding = false;
      btn.disabled = false;
      bar.style.display = 'none';
    }
  }

  document.getElementById('addBtn').addEventListener('click', addTrack);

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTrack();
  });

  document.getElementById('urlInput').addEventListener('input', (e) => {
    const val = e.target.value.trim();
    if (val.includes('youtube.com') || val.includes('youtu.be')) {
      addTrack();
    }
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.currentTarget.classList.add('active');
      activeCategory = e.currentTarget.dataset.category;
      
      const input = document.getElementById('urlInput');
      const addBtn = document.getElementById('addBtn');
      if (activeCategory === 'music') {
        input.placeholder = 'youtube link...';
        input.disabled = false;
        addBtn.disabled = false;
      } else {
        input.placeholder = 'under construction...';
        input.disabled = true;
        addBtn.disabled = true;
      }
      
      renderAll(document.getElementById('searchInput').value);
    });
  });

const searchInput = document.getElementById('searchInput');
const clearSearchBtn = document.getElementById('clearSearchBtn');

searchInput.addEventListener('input', (e) => {
  clearSearchBtn.style.display = e.target.value ? 'block' : 'none';
  renderAll(e.target.value);
});

clearSearchBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearSearchBtn.style.display = 'none';
  renderAll('');
});

// Drag and Drop Engine
let draggedId = null;

gallery.addEventListener('dragstart', (e) => {
  const card = e.target.closest('.poster-slice');
  if (!card) return;
  draggedId = card.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => card.style.opacity = '0.5', 0);
});

gallery.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
});

gallery.addEventListener('drop', async (e) => {
  e.preventDefault();
  const targetCard = e.target.closest('.poster-slice');
  if (!targetCard || !draggedId || targetCard.dataset.id === draggedId) return;

  const items = load();
  const fromIdx = items.findIndex(x => x.id === draggedId);
  const toIdx = items.findIndex(x => x.id === targetCard.dataset.id);
  
  if (fromIdx !== -1 && toIdx !== -1) {
    const [movedItem] = items.splice(fromIdx, 1);
    items.splice(toIdx, 0, movedItem);
    await save(items);
    renderAll(searchInput.value);
  }
});

gallery.addEventListener('dragend', (e) => {
  const card = e.target.closest('.poster-slice');
  if (card) card.style.opacity = '1';
  draggedId = null;
});

document.getElementById('gallery').addEventListener('wheel', (e) => {
  if (e.deltaY !== 0 && !e.shiftKey) {
    e.preventDefault();
    document.querySelector('.shelf-wrapper').scrollBy({
      left: e.deltaY * 2,
      behavior: 'auto'
    });
  }
});

</script>
